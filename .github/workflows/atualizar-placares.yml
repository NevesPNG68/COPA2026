name: Atualizar placares da Copa 2026

on:
  schedule:
    # GitHub usa UTC. Roda a cada 10 minutos.
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/atualizar-placares.yml'
      - 'scripts/atualizar_placares.mjs'
      - 'scripts/remover_placares_futuros.mjs'

permissions:
  contents: write

jobs:
  atualizar-placares:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar placares, corrigir HTML e gerar JSON
        run: node scripts/atualizar_placares.mjs

      - name: Remover placares de jogos ainda não encerrados
        run: node scripts/remover_placares_futuros.mjs

      - name: Patch final de placares recentes e index
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const jsonFile = 'placares.json';
          const data = JSON.parse(fs.readFileSync(jsonFile, 'utf8'));
          data.source = 'GitHub Actions + ESPN scoreboard + patch final';
          data.updatedAt = new Date().toISOString();
          data.scores = data.scores || {};
          Object.assign(data.scores, {
            '2026-06-27|jordan|argentina': '1 x 3',
            '2026-06-27|argentina|jordan': '3 x 1',
            '2026-06-27|algeria|austria': '3 x 3',
            '2026-06-27|austria|algeria': '3 x 3',
            '2026-06-28|jordan|argentina': '1 x 3',
            '2026-06-28|argentina|jordan': '3 x 1',
            '2026-06-28|algeria|austria': '3 x 3',
            '2026-06-28|austria|algeria': '3 x 3'
          });
          data.scores = Object.fromEntries(Object.entries(data.scores).sort(([a],[b]) => a.localeCompare(b)));
          fs.writeFileSync(jsonFile, JSON.stringify(data, null, 2) + '\n');

          const htmlFile = 'index.html';
          let html = fs.readFileSync(htmlFile, 'utf8');

          html = html.replace('<section class="sec" id="classificacao">', '<section class="sec recolhido" id="classificacao">');
          html = html.replace('<div class="grid" id="stand"></div><div class="note">Critérios do app: pontos, saldo, gols pró e ordem alfabética como desempate temporário. Cartões/sorteio podem ser ajustados depois.</div></section>', '<button class="toggleBtn" data-toggle="classificacao" data-open="Ocultar classificação por grupo" data-closed="Ver classificação por grupo">Ver classificação por grupo</button><div class="grid" id="stand"></div><div class="note">Critérios do app: pontos, saldo, gols pró e ordem alfabética como desempate temporário. Cartões/sorteio podem ser ajustados depois.</div></section>');
          html = html.replace('.recolhido .tools,.recolhido>.table,.recolhido>.explain{display:none!important}', '.recolhido .tools,.recolhido>.table,.recolhido>.explain{display:none!important}\n#classificacao.recolhido #stand,#classificacao.recolhido .note{display:none!important}');

          html = html.replaceAll("${A.prov?' <span class=\"pill pending\">a confirmar</span>':''}", "");
          html = html.replaceAll("${B.prov?' <span class=\"pill pending\">a confirmar</span>':''}", "");
          html = html.replaceAll("<span class=\"pill pending\">a confirmar</span>", "");
          html = html.replace('Quando aparecer “a confirmar”, o time está sendo calculado com a classificação atual. Quando o grupo ou jogo anterior fechar, o app substitui automaticamente pelo classificado oficial.', 'Os confrontos são calculados automaticamente conforme os classificados e os 3ºs colocados definidos.');

          fs.writeFileSync(htmlFile, html);
          NODE

      - name: Salvar alterações no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html placares.json
          git diff --cached --quiet && echo "Sem alteração de placar." || git commit -m "Atualizar placares da Copa 2026"
          git push

# instalado por ChatGPT em 2026-06-14
