name: Publicar GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Preparar site estático
        run: |
          mkdir -p _site
          rsync -av --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
          if [ -f _site/index.html ] && [ -f _site/mobile-fix.css ]; then
            if ! grep -q "mobile-fix.css" _site/index.html; then
              sed -i 's#</head>#<link rel="stylesheet" href="mobile-fix.css"></head>#' _site/index.html
            fi
          fi
          if [ -f _site/index.html ] && [ -f _site/placar-auto.js ]; then
            if ! grep -q "placar-auto.js" _site/index.html; then
              sed -i 's#</body>#<script src="placar-auto.js"></script></body>#' _site/index.html
            fi
          fi
      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
