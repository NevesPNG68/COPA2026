name: Publicar GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Preparar site estático
        run: |
          mkdir -p _site
          rsync -av --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
          python3 - <<'PY'
          from pathlib import Path
          p = Path('_site/index.html')
          html = p.read_text(encoding='utf-8')
          patch = r'''
<style id="destaque-brasil-css">
  .brasil-destaque {
    background: linear-gradient(90deg, rgba(34,197,94,.38), rgba(250,204,21,.22), rgba(34,197,94,.12)) !important;
    border-color: rgba(250,204,21,.75) !important;
    box-shadow: 0 0 22px rgba(34,197,94,.28), inset 5px 0 0 #22c55e !important;
  }
  .match.brasil-destaque {
    border: 2px solid rgba(250,204,21,.82) !important;
    position: relative;
  }
  .match.brasil-destaque::before {
    content: "🇧🇷 JOGO DO BRASIL";
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 9px;
    padding: 6px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(34,197,94,.42), rgba(250,204,21,.28));
    border: 1px solid rgba(250,204,21,.72);
    color: #fef9c3;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .06em;
    box-shadow: 0 0 14px rgba(250,204,21,.18);
  }
  tr.brasil-destaque td:first-child::before {
    content: "🇧🇷 ";
  }
</style>
<script id="placar-automatico-js">
(function(){
  var ESPN_SCOREBOARD = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=';
  var rodando = false;
  var ultima = 0;
  function limpar(txt){
    return String(txt || '')
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-zA-Z0-9 ]+/g,' ')
      .replace(/\s+/g,' ')
      .trim().toLowerCase();
  }
  function canon(nome){
    var n = limpar(nome);
    var m = {
      'czechia':'czech republic',
      'czech rep':'czech republic',
      'bosnia and herzegovina':'bosnia herzegovina',
      'bosnia herzegovina':'bosnia herzegovina',
      'ivory coast':'cote d ivoire',
      'cote d ivoire':'cote d ivoire',
      'cote divoire':'cote d ivoire',
      'united states':'united states',
      'usa':'united states',
      'south korea':'south korea',
      'korea republic':'south korea',
      'korea rep':'south korea',
      'turkey':'turkiye',
      'turkiye':'turkiye',
      'türkiye':'turkiye',
      'netherlands':'netherlands',
      'dr congo':'dr congo',
      'congo dr':'dr congo',
      'cape verde':'cape verde',
      'saudi arabia':'saudi arabia',
      'south africa':'south africa',
      'new zealand':'new zealand'
    };
    return m[n] || n;
  }
  function chave(data,a,b){ return data + '|' + canon(a) + '|' + canon(b); }
  function marcarBrasil(){
    document.querySelectorAll('tr, .match').forEach(function(el){
      var texto = (el.textContent || '').toLowerCase();
      var temBrasil = texto.indexOf('brasil') >= 0 || texto.indexOf('brazil') >= 0 || el.querySelector('[alt="Brasil"], [alt="Brazil"]');
      if (temBrasil) el.classList.add('brasil-destaque');
    });
  }
  function datasParaBuscar(){
    try{
      if (!Array.isArray(G)) return [];
      var agora = new Date();
      var inicio = new Date(agora.getTime() - 7*24*60*60*1000);
      var limite = new Date(agora.getTime() + 2*60*60*1000);
      var todos = [];
      if (Array.isArray(G)) todos = todos.concat(G);
      if (Array.isArray(KO)) todos = todos.concat(KO);
      var set = Object.create(null);
      todos.forEach(function(j){
        if (!j || !j.date || !j.time) return;
        var d = new Date(j.date + 'T' + j.time + ':00-03:00');
        if (d >= inicio && d <= limite) set[String(j.date).replace(/-/g,'')] = true;
      });
      return Object.keys(set).sort();
    }catch(e){ return []; }
  }
  async function buscarPlacaresESPN(forcar){
    var agora = Date.now();
    if (rodando) return;
    if (!forcar && agora - ultima < 20000) return;
    if (typeof S === 'undefined') return;
    rodando = true;
    ultima = agora;
    var alterou = false;
    try{
      var datas = datasParaBuscar();
      await Promise.all(datas.map(async function(data){
        try{
          var resp = await fetch(ESPN_SCOREBOARD + data + '&_=' + Date.now(), {cache:'no-store', mode:'cors', credentials:'omit'});
          if (!resp.ok) return;
          var dados = await resp.json();
          (dados.events || []).forEach(function(ev){
            var estado = ev && ev.status && ev.status.type && ev.status.type.state;
            if (estado === 'pre') return;
            var comp = ev.competitions && ev.competitions[0];
            var cs = comp && comp.competitors;
            if (!cs || cs.length < 2) return;
            var c1 = cs[0], c2 = cs[1];
            var t1 = c1.team && (c1.team.displayName || c1.team.shortDisplayName || c1.team.name || c1.team.location);
            var t2 = c2.team && (c2.team.displayName || c2.team.shortDisplayName || c2.team.name || c2.team.location);
            var s1 = c1.score, s2 = c2.score;
            if (!t1 || !t2 || s1 === undefined || s2 === undefined) return;
            var dataEvento = String(ev.date || '').slice(0,10) || (data.slice(0,4)+'-'+data.slice(4,6)+'-'+data.slice(6,8));
            var p1 = s1 + ' x ' + s2;
            var p2 = s2 + ' x ' + s1;
            var k1 = chave(dataEvento,t1,t2), k2 = chave(dataEvento,t2,t1);
            if (S[k1] !== p1) { S[k1] = p1; alterou = true; }
            if (S[k2] !== p2) { S[k2] = p2; alterou = true; }
          });
        }catch(e){ console.warn('Falha ESPN placar:', e); }
      }));
      if (alterou && typeof render === 'function') {
        render();
        if (typeof $ === 'function' && $('upd')) $('upd').textContent = 'ESPN ' + new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
      }
      marcarBrasil();
    }catch(e){ console.warn('Falha geral ao atualizar placares:', e); }
    rodando = false;
  }
  function iniciar(){
    marcarBrasil();
    setTimeout(function(){ buscarPlacaresESPN(true); }, 1800);
    setInterval(function(){ buscarPlacaresESPN(false); marcarBrasil(); }, 30000);
    window.addEventListener('focus', function(){ buscarPlacaresESPN(true); marcarBrasil(); });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', iniciar);
  else iniciar();
})();
</script>
'''
          html = html.replace('<style id="destaque-brasil-css">', '<style id="destaque-brasil-css-old">')
          html = html.replace('<script id="destaque-brasil-js">', '<script id="destaque-brasil-js-old">')
          if 'id="placar-automatico-js"' not in html:
              html = html.replace('</head>', patch + '</head>', 1)
          p.write_text(html, encoding='utf-8')
          PY
      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
