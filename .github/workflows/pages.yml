name: Publicar GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Preparar site estático
        run: |
          mkdir -p _site
          rsync -av --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
          rm -f _site/mobile-fix.css
          rm -f _site/placar-auto.js
          if [ -f _site/index.html ]; then
            sed -i '/mobile-fix.css/d' _site/index.html
            sed -i '/placar-auto.js/d' _site/index.html
            if ! grep -q 'hide-confirmado-mata' _site/index.html; then
              sed -i 's|</head>|<style id="hide-confirmado-mata">#mata .pending{display:none!important}</style></head>|' _site/index.html
            fi
          fi
      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
